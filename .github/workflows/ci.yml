name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # The hardening audit trail (design/hardening/) is append-only and never deleted — a run
  # record is written once and never edited. This runs on EVERY change (not paths-filtered),
  # so a deletion anywhere in the trail always fails CI.
  hardening-append-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Resolve base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Hardening trail is append-only (no deletes, records immutable)
        run: python scripts/check_hardening_append_only.py "${{ steps.base.outputs.ref }}"

  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'

  compliance:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install maddening pyyaml
      - name: Validate known-limitations registry
        run: python scripts/check_anomalies.py
      - name: Validate bibliography citations
        run: python scripts/check_citations.py

  test:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[ci]" "ruff==0.15.20" "pyright==1.1.411"
      - name: Lint
        run: ruff check src tests scripts
      - name: Type-check
        run: pyright src
      - name: Test (verification + fast decoys)
        env:
          JAX_PLATFORMS: cpu
        run: pytest -m "not slow and not validation and not needs_llm"
      - name: Check Mechanism-Card implementation mapping
        run: python scripts/check_impl_mapping.py
