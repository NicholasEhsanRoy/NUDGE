# NUDGE Known Limitations Registry
#
# The honest counterweight to the press release: a living, CI-validated list of
# NUDGE's known failure modes — most of them enumerated by the decoy battery.
# Validated by scripts/check_anomalies.py (which wraps MADDENING's
# validate_anomaly_registry with the NUDGE-LIM- prefix). Entries are added as
# the decoy battery and mechanism library grow (Phase 3+).
#
# ID convention: NUDGE-LIM-NNN. Each entry should, where applicable, reference
# the decoy (NUDGE-DECOY-NNN) that exercises it and the mechanism it constrains.

schema_version: "1.0"
nudge_version: "0.1.0"
generated_date: "2026-07-08"
anomalies:
  - anomaly_id: NUDGE-LIM-001
    title: Noise-induced bimodality can masquerade as a switch
    description: >-
      A bimodal single-cell distribution is not, by itself, evidence of a bistable
      switch. A non-cooperative positive-feedback loop with slow promoter switching
      (the telegraph / bursting regime; To & Maheshri 2010, Kepler & Elston 2001) is
      deterministically MONOSTABLE yet produces a clearly bimodal snapshot. A naive
      bimodality detector would call ultrasensitivity. NUDGE must decline: its
      circuit-level linear-baseline parsimony gate requires the mechanistic switch
      model to beat a linear baseline beyond the loss noise floor, which telegraph data
      does not — so NUDGE returns off-model ("no switch detected") on both the
      single-basin and the transition-mode paths. Exercised by NUDGE-DECOY-001.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      Handled correctly today (NUDGE abstains), but the guarantee rests on the
      parsimony gate's calibration (margin_k). A mis-tuned gate could false-positive on
      noise-induced bimodality; the decoy is the regression test that keeps it honest.

  - anomaly_id: NUDGE-LIM-002
    title: A cell-type / doublet mixture can fake a bimodal switch
    description: >-
      Bimodality in a snapshot can come from a static mixture of two subpopulations
      (distinct cell types, or doublets) at different fixed expression levels — no
      dynamical switch is present. A naive bimodality detector would call
      ultrasensitivity. NUDGE must decline: the circuit-level parsimony gate finds the
      mechanistic switch model does not beat a linear baseline beyond the noise floor,
      so it returns off-model ("no switch detected"). Exercised by NUDGE-DECOY-002.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      Handled today, but NUDGE assumes each condition is one population at steady state.
      Genuine cell-type heterogeneity is the caller's responsibility to control (cluster
      first); the decoy guards the gate against being fooled by population structure.

  - anomaly_id: NUDGE-LIM-003
    title: Technical dropout can produce a switch-like zero-peak
    description: >-
      A monostable population read out at bimodal library depth (some cells captured at
      very low depth read as near-all-zeros) produces a zero-peak plus an expression
      mode that mimics an OFF/ON switch. The bimodality is a measurement artifact, not
      biology. NUDGE must decline (off-model) via the parsimony gate. Exercised by
      NUDGE-DECOY-003.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      NUDGE owns the negative-binomial count model but does not model an explicit
      capture/dropout process; severe, structured depth variation could still bias a
      fit. The decoy keeps the gate honest against depth-driven pseudo-bimodality.

  - anomaly_id: NUDGE-LIM-004
    title: A targeted-but-ineffective perturbation must not be reported as a mechanism
    description: >-
      A guide can target a switch gene yet produce no knockdown (a "dead guide"). The
      condition then looks like WT. NUDGE must return no-effect for that perturbation —
      not report threshold/gain/ceiling merely because the WT is a switch. The per-
      perturbation no-effect gate (perturbed distribution ≈ WT, within the effect
      margin) handles this. Exercised by NUDGE-DECOY-004.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      A false mechanism call on an ineffective guide would waste a follow-up. The gate
      depends on the effect margin (a multiple of the WT self-distance); a mis-set margin
      could miss a small-but-real effect or over-call noise. The decoy pins the gate.

  - anomaly_id: NUDGE-LIM-005
    title: A marginal nonlinearity must not be over-called as a switch
    description: >-
      Data from a barely-nonlinear circuit (Hill n only slightly above 1) is close to
      linear. A greedy fitter would still fit a Hill and claim ultrasensitivity. NUDGE
      must decline: the circuit-level parsimony gate requires the mechanistic model to
      beat a linear baseline beyond the loss noise floor, which a marginal Hill does not,
      so it returns off-model. This is the calibration test for the gate's noise margin
      (margin_k). Exercised by NUDGE-DECOY-005.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      The whole "fails safely" claim rests on this margin: too loose and marginal
      nonlinearities become false switches. NUDGE-DECOY-005 is the regression test that
      the calibrated margin_k (1.7) rejects a within-floor nonlinearity.

  - anomaly_id: NUDGE-LIM-006
    title: A nonlinear measurement readout is misattributed as a circuit switch
    description: >-
      NUDGE assumes an AFFINE reporter (Λ = base + scale·activity). A linear (non-switch)
      circuit observed through a NONLINEAR reporter — saturating or sigmoidal (Hill h≥1) —
      produces a skewed / pseudo-bimodal count distribution that the affine-readout switch
      model can only explain by bending the circuit. NUDGE cannot structurally distinguish
      readout ultrasensitivity from circuit ultrasensitivity, because only the composition
      readout∘circuit is observed. Verified: at strong readout nonlinearity (h≈6) plus a
      strong perturbation, NUDGE emits a CONFIDENT FALSE POSITIVE (variably threshold /
      gain / ceiling across seeds) even at adequate fit budget. Higher fit budget strongly
      mitigates but does not eliminate it (at fit()'s default 256/300 budget it is fooled
      broadly; at 384/400 most configs recover correct abstention). This BOUNDS the
      "fails safely" guarantee: it holds under an approximately-affine readout.
      Witnessed by generate_readout_nonlinearity_decoy + tests/verification (xfail).
    severity: major
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This is the sharpest bound on the core fail-safe guarantee: under a strongly
      nonlinear reporter NUDGE can be confidently wrong, not merely abstain. Mitigation
      requires a calibrated (non-affine) Readout in the forward model or an independent
      reporter-linearity control. A constitutive-reporter calibration (driving the reporter
      at known doses, bypassing the circuit) is VALIDATED to break the degeneracy — it lets
      the fit reject "no switch" and conclude the ultrasensitivity is biological (see
      FINDINGS "NUDGE-LIM-006 mitigation"). Not yet wired into the release forward model.

  - anomaly_id: NUDGE-LIM-007
    title: A dose series that does not span the inflection makes gain unidentifiable
    description: >-
      In dose-response attribution (nudge.inference.dose_response), when a dose /
      knockdown series does not push past the response inflection — the fitted threshold
      K falls outside the observed dose range — a Hill fit sees only ONE ARM of the
      sigmoid. On one arm, gain (n) and threshold (K) trade off: a graded n≈1 curve is
      indistinguishable from a high-threshold switch whose transition lies just past the
      last dose. A naive fitter reports a spuriously precise n (the classic
      over-interpretation of an under-determined curve). NUDGE must abstain
      (unresolved): the classifier requires the doses to span the inflection AND the
      bootstrap n-CI to clear the switch/graded line, else it returns unresolved.
      VERIFIED on real data — NANOG own-knockdown (GSE283614) reaches only ~75% KD, its
      fitted K sits past the maximum dose, and its n-profile R² is flat within 0.075
      across all n (n=1 to n=12 fit equally well); NUDGE correctly abstains where a
      bounded Hill fit reports a misleadingly graded n≈2.2. Contrast OCT4 in the same
      screen, whose inflection IS spanned (n≈6.7, R²=0.99) and resolves as a switch.
      Guarded by the inflection-spanning + CI-straddle gates and the OCT4/NANOG
      regression (tests/inference/test_dose_response.py).
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      An over-called gain on a truncated dose series would send a follow-up chasing a
      switch the data cannot support — the same confident-wrong failure the project
      exists to avoid, here from a human eyeballing a point estimate rather than the
      model. The guarantee rests on the classifier's inflection-spanning check and the
      bootstrap CI; too-loose thresholds would resurrect the false "graded" / "switch"
      call. Also note the reported n is an APPARENT population gain (pseudobulk conflates
      within-cell cooperativity with a spread of single-cell thresholds), not molecular
      cooperativity — an independent honesty caveat shared with NUDGE-LIM-006.

  - anomaly_id: NUDGE-LIM-008
    title: A cross-modality readout must be declared, never guessed — refuse ambiguous input
    description: >-
      In cross-modality readout attribution (nudge.inference.cross_modality), NUDGE runs
      its dose-response attribution on a CONTINUOUS single channel (fluorescence /
      activity / fold-change) instead of raw counts. The sharp new failure mode is a
      modality confusion: silently accepting LOG-NORMALIZED counts (log1p-CPM single-cell
      data, which is zero-inflated from dropout and continuous in its tail) or RAW COUNTS
      dressed up as a continuous fluorescence signal would feed a garbage curve into the
      fit and could manufacture a confident-wrong knob call. NUDGE never GUESSES a
      modality: the caller must declare it (modality="fluorescence"/"activity"/
      "foldchange" vs "counts"), and the bouncer (nudge.data.ingest.check_readout) REFUSES
      ambiguous input rather than fit it — three witnesses: all-integer values (raw counts
      mislabeled as continuous), a large fraction of exact zeros beside a continuous tail
      (the log-normalized-counts / dropout fingerprint), and substantially-negative values
      (scaled / centered / log-ratio data). The count path (check_counts) is UNCHANGED —
      modality="counts" delegates to the existing raw-integer guard, which is not weakened.
      A second, softer bound: the knob call is COMPARATIVE (variant vs a control curve) and
      a single operating point cannot always separate a threshold (EC50) shift from a
      ceiling/leakiness change (a raised leakiness floor repositions the apparent EC50 in
      fold-change space); NUDGE returns INCONCLUSIVE there rather than force a knob.
      VERIFIED on Chure 2019 (CaltechDATA D1.1241): inducer-binding mutants Q294K/Q294V
      localize to threshold, DNA-binding mutants Y20I/Q21A to ceiling/leakiness, the
      near-non-inducible Q294R abstains (non-responsive), and no mutant is mis-called or
      called gain — while F164T/Q21M are honestly inconclusive at one operating point.
      Guarded by the bouncer's refusals + the sign-aware knob gates + the Chure lock-in
      (tests/inference/test_cross_modality.py). Inherits the affine-readout bound
      NUDGE-LIM-006 (a nonlinear reporter can still fake ultrasensitivity).
    severity: major
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      Silently fitting log-normalized or raw counts as if they were a continuous
      fluorescence signal is exactly the confident-wrong failure the project exists to
      avoid — the curve would be meaningless yet the fit would return a knob. The
      guarantee rests on the modality being DECLARED (never inferred) and the bouncer
      refusing the ambiguous fingerprints (all-integer, zero-inflated, substantially
      negative); a loosened bouncer, or an unmodelled nonlinear reporter (NUDGE-LIM-006),
      would resurrect a false positive. The comparative knob call also inherits the
      dose-response identifiability regime (the doses must span the inflection,
      NUDGE-LIM-007) and abstains (inconclusive) when one operating point cannot separate
      threshold from ceiling.

  - anomaly_id: NUDGE-LIM-009
    title: A combination attribution inherits its weakest single arm, and its interaction is scalar
    description: >-
      In synergy / epistasis attribution (nudge.inference.epistasis), the additive null
      predicted-effect(A+B) = effect(A) + effect(B) is only as trustworthy as the two
      single-arm effects it composes. Three honest failure modes follow. (1) WEAKEST-ARM
      INHERITANCE: if either single arm is underpowered (too few cells) or a dead guide
      (no effect), the interaction cannot be attributed — NUDGE returns unresolved /
      no-effect rather than a synergy call (a combo cannot be more certain than its
      components). (2) DEPTH / BATCH CONFOUND: a sequencing-depth or batch difference
      between the A+B condition and the singles can masquerade as an interaction; NUDGE
      depth-normalizes (size-factor to the median) and abstains on an underpowered or
      wide-CI combo, but cannot separate a confound that is perfectly aligned with the
      A+B condition. SHARPENED (red-team Hole 2): the residual confound need NOT be a depth
      difference. Size-factor normalization corrects only a MULTIPLICATIVE library-size
      difference, so an ADDITIVE, gene-level offset on the signature genes in the A+B
      condition (ambient-RNA contamination, or a batch-specific expression shift
      concentrated in the A+B 10x lane) SURVIVES normalization and produces a CONFIDENT
      'synergistic' call — tight interaction CI entirely > 0, ΔBIC ~10^3 — tripping NO
      abstention gate (the epistasis classifier sees only the projected scalar; the entire
      depth/batch defense is the upstream size-factor step this confound bypasses). VERIFIED
      end-to-end through the shipped bridge (combo_effect_scores -> attribute_synergy), 4/4
      seeds (scripts/redteam/epistasis_pipeline_confound.py). Worse, the off-axis
      neomorphic_ratio MIS-FIRES on such an artifact (1.4-1.8 >= 1.0), so the possible-
      neomorphic under-count warning would misdirect a user toward "a hidden regulator /
      emergent state" on a boring batch artifact — the exact over-read NUDGE-LIM-015 exists
      to prevent. Two responses (SHIPPED): the neomorphic note wording now states an off-axis
      residual is EQUALLY consistent with a batch/ambient/technical artifact and must not be
      read as corroboration of the interaction (never emergent-biology evidence); and the
      confound is LOCKED as a strict-xfail decoy (tests/inference/test_epistasis.py::
      test_additive_ambient_offset_on_ab_must_not_fake_synergy) so it cannot silently change.
      NO runtime gate is added: an additive offset perfectly aligned with the A+B condition
      is, on count data with no orthogonal batch covariate or biologically-inert control-gene
      set, INDISTINGUISHABLE at the pseudobulk scalar from real super-additivity (real
      synergy also raises A+B's counts), so any gate sensitive enough to catch it would
      false-abstain on genuine synergy — it is unsafe to build. Mitigation DIRECTION (not
      applied, for the user/experimentalist): supply a batch/lane covariate ORTHOGONAL to the
      A+B condition, or an inert control-gene panel, so a technical axis tracking A+B can be
      detected; without one this confound is fundamentally unresolvable (as this clause
      already conceded — the red-team VERIFIES the concession is a confident wrong call, not a
      graceful abstention). (3) EFFECT-SPACE DEPENDENCE + SCALAR-PROJECTION BOUND: the additive
      null depends on the chosen effect space (NUDGE uses log-fold-change, i.e. Bliss
      independence; raw-count or HSA nulls would move the baseline), and the reported
      interaction is a SCALAR measured along the additive axis fixed by the two singles —
      a purely ORTHOGONAL emergent state (a combination moving in a direction neither
      single spans) is not captured by this scalar. This orthogonal blind spot is now
      QUANTIFIED, not just asserted: combo_effect_scores(..., return_geometry=True)
      reports the off-axis residual (the interaction residual orthogonal to the additive
      axis) as EpistasisFit.off_axis_residual / neomorphic_ratio, and a synergistic /
      buffering call whose off-axis residual rivals the on-axis interaction
      (neomorphic_ratio >= 1.0) gains an honest UNDER-count warning in its reason — the
      scalar is direction-correct but may under-count an emergent (possibly-neomorphic)
      component. This is a flag, NOT a discovery or a hidden-node claim. Most sharply: a
      super-additive residual is NOT by itself evidence of a hidden node or rewiring (that
      bridges to the Capability-7 hidden-node trap, which NUDGE does not claim) — it is a
      magnitude statement about non-additivity along a known axis, no more. VERIFIED on
      Norman 2019 (GSE133344): CBL+CNN1 / CBL+UBASH3B read synergistic and DUSP9+ETS2 reads
      buffering (DUSP9-dominant suppression of ETS2), matching the paper's taxonomy;
      FOXA1+FOXA3 reads additive; and the off-axis diagnostic flags the three synergy
      pairs (off-axis >= on-axis) while leaving the clean on-axis DUSP9+ETS2 masking
      unflagged (ratio 0.62). Guarded by the min-cells + CI-width abstention gates, the BIC
      parsimony gate, the Norman lock-in, and the additive-ambient-offset strict-xfail decoy
      (tests/inference/test_epistasis.py). Inherits the affine-readout bound NUDGE-LIM-006.
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      A false synergy call would send a combination-therapy or genetic-interaction
      follow-up chasing an emergent mechanism the data does not support — the confident-
      wrong failure the project exists to avoid, now VERIFIED reachable (red-team Hole 2: an
      additive ambient offset aligned with A+B yields a confident 'synergistic', 4/4 seeds),
      which is why this is graded major / safety_relevant rather than a mere abstention gap.
      The guarantee rests on the weakest-arm inheritance rule (abstain when either single arm
      is underpowered), the CI-width and BIC gates, and honest reporting of the effect space
      — but these gates CANNOT see a batch/ambient axis aligned with A+B (that is upstream
      normalization's job, and size-factor normalization is blind to a non-multiplicative
      offset). The residual risk is therefore documented, the confound LOCKED as a strict-
      xfail decoy, and the off-axis neomorphic flag re-worded so it can never be read as
      corroboration; separating a perfectly-aligned additive confound requires an orthogonal
      batch covariate or an inert control-gene set the caller must supply. Too-loose
      thresholds, or reading the scalar residual as a hidden-node claim, would each resurrect
      a false positive.

  - anomaly_id: NUDGE-LIM-012
    title: The bifurcation-proximity dial is a one-sided lower bound near the fold
    description: >-
      In bifurcation / tipping-point attribution (nudge.inference.bifurcation), NUDGE
      reports a robustness DIAL — how close a bistable switch is to a saddle-node fold —
      from three channels: critical slowing (min|Re lambda| of the drift Jacobian at each
      stable mode -> 0 at the fold), basin collapse (stable-node -> index-1-saddle
      distance -> 0), and LNA lobe swell (sqrt(lambda_max(Sigma)) / inter-mode separation
      -> 1). The load-bearing honesty point: the linear-noise (LNA) Gaussian used by the
      third channel BREAKS DOWN PRECISELY AT THE FOLD — a mode's variance diverges as its
      Jacobian eigenvalue -> 0 — so the estimate is LEAST reliable exactly where it
      matters most. NUDGE therefore reports the score as a ONE-SIDED LOWER BOUND near the
      fold ("the switch is AT LEAST this close"), never a point estimate
      (BifurcationScore.one_sided is set once the lobes overlap), and classify_robustness
      returns near-fold there. On the far / deep-basin side, where the slowest relaxation
      rate has saturated at the intrinsic decay rate and the noise lobes carry no fold
      information (the dial has hit the end of its dynamic range), NUDGE ABSTAINS
      (unresolved) rather than emit a false-precise "far" number it cannot support — the
      switch is clearly not near a fold, but the distance is beyond the dial's resolution.
      A monostable circuit (< 2 stable modes) returns not-bistable (score None). Validated
      on the self-activation switch's KNOWN analytic saddle-node in cooperativity n (and in
      threshold K): sweeping toward the fold, all three channels move monotonically
      (min|Re lambda| -> 0, node->saddle -> 0, lobe ratio -> 1(+)) and the fused 0..1 dial
      ranks proximity correctly, with one_sided setting near the fold (FINDINGS "Phase
      4f"; tests/inference/test_bifurcation.py). A real-data lock-in (a bistable dose
      ladder approaching a fold) is a deferred follow-up; the synthetic parameter sweep is
      the load-bearing validation.
    severity: major
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This dial is the hard dependency for the future design() safety gate (it must flag
      an intervention that pushes a switch toward a tipping point), so a confidently-wrong
      "you are safe" number would be exactly the failure the project exists to avoid — and
      it would be most tempting to emit precisely where the noise model is weakest (at the
      fold). The guarantee rests on the one-sided-lower-bound framing near the fold and the
      deep-basin abstention (never a precise "far" number); the two deterministic channels
      (critical slowing, basin collapse) are depth-independent and stand, but the LNA lobe
      channel is untrustworthy near the fold and at low sequencing depth (attribute_
      bifurcation calibrates the depth from data and reports lna_reliable's verdict as a
      lobe-channel caveat). A point estimate near the fold, or a precise proximity emitted
      on the deep-basin side, would each resurrect a false-precision failure.

  - anomaly_id: NUDGE-LIM-013
    title: A designed intervention is a model-bound proposal, valid only within the fit
    description: >-
      In inverse / intervention design (nudge.design.invert, NUDGE-METHOD-007), NUDGE
      inverts a RELIABLE attribution to PROPOSE an untested intervention — a change to a
      kinetic parameter (circuit mode) or a dose (curve mode) that moves the system toward
      a target. The load-bearing honesty point: a proposal is the inverse of a MODEL, so
      it is valid only within that fit's identifiable region — it is a hypothesis to test,
      not a guaranteed outcome, and NUDGE must never extrapolate it into confident false
      precision. Three guarantees enforce this. (1) Integrity gate: design() refuses to
      invert an unreliable attribution (an unresolved / no-effect dose-response, a
      low-confidence fit) — it returns an AbstentionResult rather than prescribe off a fit
      it does not trust. (2) Reachability gate: if no intervention closes the target gap
      within tolerance (circuit mode), or the target response y is outside the curve's
      achievable (floor, floor+amp) range (curve mode), design() ABSTAINS ("the target is
      unreachable within the fit's identifiable region") rather than extrapolate a dose
      beyond the fitted saturating asymptotes or a kinetic change the model cannot reach.
      (3) Safety gate (circuit mode only): design() scores bifurcation_proximity
      (NUDGE-METHOD-006) on the base vs the intervened circuit and flags an intervention on
      TWO INDEPENDENT ALARMS — a RELATIVE proximity rise past margin
      (high_risk_of_instability via delta > margin), OR an ABSOLUTE landing at/above the
      shipped NEAR_FOLD cut (near_fold: proximity_after >= NEAR_FOLD, the SAME threshold
      classify_robustness uses to call a circuit near-fold) — and separately flags a
      fold-crossing that destroys bistability (crosses_fold). The absolute check closes a
      former blind spot (below): before it, the gate fired ONLY on delta > margin, so an
      intervention that pushed a robust switch ACROSS NEAR_FOLD by a SUB-MARGIN increment
      was cleared "OK, stays away from the fold" while classify_robustness on the identical
      circuit called it near-fold. All near-fold verdicts inherit Cap 5's ONE-SIDED LOWER
      BOUND near the fold (NUDGE-LIM-012), so the risk is reported as "at least this close",
      never a point estimate — and that caveat is now carried on the SAFE ("OK") reason
      branch too whenever proximity_after is one-sided (the falsely-reassuring number must
      not read as a point estimate; the true proximity may be higher). This blind spot was
      found by an adversarial red-team (design/FAILSAFE_REDTEAM_3.md HOLE 3;
      scripts/redteam/design_safety_gate_absolute_proximity.py — deterministic) and is now
      regression-locked (tests/design/test_invert.py::
      test_safety_gate_flags_sub_margin_push_across_near_fold plus a positive control that a
      genuinely-robust intervention below NEAR_FOLD is still cleared "OK", so the absolute
      gate does not over-abstain; FINDINGS "P3 — design safety gate absolute near-fold").
      Curve mode carries NO safety gate (there
      is no circuit / fold to score), which is stated in the plan's reason rather than
      silently omitted. A further subtlety: gradient inversion sees only the basin it
      starts in — a knob whose effect on the starting fixed point is weak can leave the
      optimizer stalled, which is reported as a reachability abstention, never a forced
      call. Validated on synthetic ground truth (known-intervention recovery to loss ~0;
      the fold-crossing flip flagged high-risk; a safe nudge cleared; curve round-trip and
      out-of-range abstention) and a real-data OCT4 fit inversion (tests/design/
      test_invert.py). design() adds no new fit, so it also inherits the honesty bounds of
      whatever produced the attribution (e.g. NUDGE-LIM-006 / NUDGE-LIM-007 for a
      dose-response fit).
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is the capability where a confidently-wrong output would do the most harm: a
      proposed intervention is an ACTION a user might take (a knockdown dose, an engineered
      kinetic change), so a false-precise or unreachable proposal — or one that silently
      destabilizes a switch — is exactly the failure the project exists to avoid. The
      guarantee rests on three gates: the integrity gate (never design off an unreliable
      fit), the reachability abstention (never extrapolate to an unreachable target), and
      the bifurcation safety gate (flag a fold-crossing / fold-approaching intervention,
      as a one-sided lower bound near the fold). Curve mode's ABSENCE of a safety gate is a
      deliberate honesty choice, stated with every dose proposal, not a silent gap. Every
      proposal is a model-bound hypothesis to be tested experimentally, never a
      guaranteed outcome.

  - anomaly_id: NUDGE-LIM-014
    title: Multi-reporter attribution presumes the panel reports ONE latent switch
    description: >-
      In multi-reporter joint attribution (nudge.inference.multi_reporter,
      NUDGE-METHOD-008), NUDGE breaks the K⇄v_max / gain⇄threshold degeneracy (FINDINGS §2)
      by fitting several downstream reporters of ONE latent switch JOINTLY — each an affine
      readout y_j = base_j + gain_j·A·f(dose; K, n) of the same latent, with the reporter
      affine pinned from the control. The entire identifiability gain rests on the premise
      that the panel genuinely reports a SINGLE shared latent. Two honest failure modes
      follow. (1) INCONSISTENT PANEL: if a reporter secretly reads a DIFFERENT latent (a
      hidden co-regulated node, a distinct switch, or a mislabeled panel), no shared (K, n)
      + per-reporter affine can fit all curves — the joint residual is large. NUDGE must
      NOT average this into a confident call: the consistency guard abstains OFF-MODEL when
      the shared-latent panel R² is poor, when a reporter fits its OWN Hill cleanly yet the
      shared latent explains it badly (it reads a different latent), or when the
      shared-vs-independent residual ratio is large. Reporter inconsistency is FLAGGED, not
      silently averaged away. (2) SINGLE-REPORTER DEGENERACY: with one reporter (M=1) the
      reporter gain cannot be pinned or checked for stability, so a latent CEILING change
      is degenerate with the reporter's own gain drifting — NUDGE returns UNRESOLVED (the
      very abstention the panel is built to break), never a forced mechanism. The pinned-
      affine assumption (a reporter is a fixed measurement device, same in control and
      perturbed) is what makes the ceiling identifiable, and it is CHECKABLE only with >=2
      reporters. VERIFIED on synthetic ground truth: a known threshold-only / gain-only /
      ceiling-only perturbation on ONE latent seen through 4 heterogeneous-gain reporters —
      JOINT recovery 24/24 (100%) vs SINGLE-reporter 0/24, with 0 confident-wrong calls;
      and every inconsistent panel (one reporter with a shifted latent) is refused
      off-model. Reported n / K / A are APPARENT population parameters (with bootstrap CIs),
      not molecular constants, and a mechanism call holds only under an approximately-affine
      reporter (NUDGE-LIM-006) whose doses span the inflection (NUDGE-LIM-007). Guarded by
      the consistency guard + the M=1 abstention + the fail-safe sweep
      (tests/inference/test_multi_reporter.py). (3) PER-CONDITION BATCH/DEPTH SCALE — THE
      FLOOR-CONSISTENCY GATE + ITS RESIDUAL BOUND (P2 red-team,
      scripts/redteam/multi_reporter_batch_confound.py). The consistency guard in (1) is
      computed on the CONTROL curves and is structurally BLIND to a technical confound
      applied to the perturbed condition only. A uniform multiplicative scale c on the WHOLE
      perturbed panel (a batch / sequencing-depth / instrument-gain difference between the
      control-condition and perturbed-condition measurement — very common: different
      plate/day/instrument) is CONSISTENT with the shared latent (it scales every reporter by
      the same fraction), so it sails past the consistency guard and aliases 1:1 onto a
      shared latent-ceiling change A = c: originally a confident CEILING (CI excludes 0,
      margins >100x) where the truth is NO-EFFECT (verified 6/6 across 2 seeds x 3 factors,
      robust to realistic floors). CLOSED (for measurable floors) by a ceiling-scoped
      FLOOR-CONSISTENCY GATE: a genuine ceiling scales only the ON term gain*A*f and leaves
      each reporter's OFF baseline (floor, dose->0) UNCHANGED, whereas a batch scales the
      whole perturbed signal so every reporter's floor is rescaled by c off its pinned
      control floor. NUDGE measures off_on_coupling = log(perturbed/control OFF baseline) /
      log(A) — approximately 0 for a genuine ceiling (floor fixed), approximately 1 for a
      batch (floor moves fully with the ON scale) — and abstains UNRESOLVED before a ceiling
      call when off_on_coupling > 0.5 (the physical midpoint). Measured separation (median
      off_on_coupling): genuine ceiling 0.00-0.10 vs batch 0.67-1.00, at BOTH the red-team's
      tiny floors (0.0,0.02) and realistic floors (0.2,0.6). RESIDUAL BOUND (locked, not
      closed): on a (near-)ZERO-floor panel there is no measurable OFF baseline to anchor on
      — the perturbed OFF doses are pure ON-leakage gain*A*f, which a genuine ceiling and a
      batch scale IDENTICALLY (both off_on_coupling approximately 1 at floor=0), so the two
      are GENUINELY INSEPARABLE. NUDGE detects this (floor_measurability = panel-median floor
      fraction of the OFF baseline < 0.6) and abstains UNRESOLVED on BOTH a batch AND a
      genuine ceiling there — the honest conservative outcome (never a confident-wrong, at
      the cost of over-abstaining a real floorless ceiling). Separating a per-condition
      multiplicative scale from a real ceiling on a (near-)zero-floor panel requires an
      INDEPENDENT DEPTH ANCHOR (a spike-in, a housekeeping reporter, or a designated
      no-response reporter) that NUDGE does not yet ingest. Guarded + locked by the
      floor-consistency gate, the batch-scale decoy, the genuine-ceiling positive control,
      and the strict-xfail floorless-bound marker (tests/inference/test_multi_reporter.py);
      measured in scripts/vv/FINDINGS.md (P2).
    severity: major
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      The identifiability force-multiplier is only trustworthy if the panel really is one
      latent switch AND the perturbed condition is on the same measurement scale as the
      control. Averaging an inconsistent panel (a reporter reading a hidden, different
      latent) into a confident threshold/gain/ceiling call, or reading a per-condition
      batch/depth scale as a confident CEILING, would each be exactly the confident-wrong
      failure the project exists to avoid — and both are tempting precisely because a joint
      fit LOOKS more authoritative than a single curve. The guarantee rests on the
      consistency guard (abstain off-model when the panel is not one shared latent), the
      single-reporter abstention (never pretend a lone reporter breaks the degeneracy), and
      the floor-consistency gate (abstain unresolved before a ceiling call when the OFF
      baseline is rescaled with the ON scale, or when the floors are too small to tell — the
      documented near-zero-floor BOUND). A loosened consistency or floor-consistency
      threshold, an unmodelled nonlinear reporter (NUDGE-LIM-006), a truncated dose series
      (NUDGE-LIM-007), or a panel with no measurable floor and no independent depth anchor
      would each resurrect a false positive.

  - anomaly_id: NUDGE-LIM-015
    title: A hidden node cannot be positively identified from an off-model verdict — NUDGE ships only the abstention
    description: >-
      In hidden-node abstention (nudge.inference.hidden_node, NUDGE-METHOD-009), when
      NUDGE's switch model is INADEQUATE — the circuit-level parsimony gate returns
      off-model (nudge.inference.classify.switch_detected), or a diagnostic residual fires
      (the off-axis / neomorphic ratio, nudge.inference.epistasis.ComboGeometry) — it is
      tempting to read the residual as a discovered hidden node / unmeasured regulator. It
      is NOT identifiable. The candidate causes of an off-model verdict are OBSERVATIONALLY
      OVERLAPPING: (1) a hidden node / unmeasured regulator (the neomorphic off-axis
      residual, NUDGE-LIM-009), (2) an off-target perturbation effect (a large restricted-
      fit residual), (3) a nonlinear measurement readout (NUDGE-LIM-006), (4) a wrong /
      misspecified topology (the Tier-0.5 T0.5-2 boundary), (5) a batch / depth confound
      (NUDGE-LIM-003, NUDGE-LIM-009), and (6) a genuinely not-a-switch (linear) circuit
      (the parsimony gate working, NUDGE-LIM-005 / NUDGE-DECOY-005) all present as "the
      affine switch model does not fit." No off-model result, and no off-axis residual, can
      separate them — and there is essentially no real Perturb-seq data with a KNOWN hidden
      node to calibrate a positive detector against. NUDGE therefore ships ONLY the honest
      abstention half: diagnose_inadequacy enumerates the six causes as a DIFFERENTIAL
      (each with its evidence, documented limitation, and the experiment that would
      distinguish it) and NEVER asserts a hidden node exists. The strongest statement it
      makes about a hidden node is that an off-axis residual is CONSISTENT WITH — but does
      NOT prove — an unmeasured regulator; the hidden-node cause's rank is capped so it is
      never the lone leading answer. Only a positive MEASUREMENT (adding the candidate
      regulator to the panel / a multiome or multi-reporter readout, turning the off-axis
      dimension into an on-axis measured one), not a residual, can establish a hidden node.
      The differential is a hypothesis-ranking aid, not a discovery. Guarded by the honesty
      test (tests/inference/test_hidden_node.py — the report NEVER emits a bare positive
      hidden-node claim) and the module/card/CLI/MCP wording. Inherits NUDGE-LIM-009 (the
      off-axis under-count) and NUDGE-LIM-006 (the readout confound).
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is the sharpest honesty boundary of the hidden-node capability: positively
      claiming "there is a hidden node here" from an off-model verdict would send a
      follow-up chasing an unmeasured regulator the data cannot support — the confident-
      wrong failure the project exists to avoid — and it is exactly the direction a
      screen-analysis user is most tempted to over-read (a neomorphic residual LOOKS like a
      discovery). The guarantee rests on shipping ONLY the abstention + differential: every
      surface (module docstring, Mechanism Card, CLI, MCP tool) states, and the honesty
      test enforces, that NUDGE never asserts a hidden node — it enumerates the
      observationally-overlapping causes and names the experiment that would distinguish
      each. Reading the differential as a verdict, or loosening the hedged wording, would
      resurrect the false positive.

  - anomaly_id: NUDGE-LIM-016
    title: Differential attribution — a depth/batch shift aligned with the context axis
      is confounded with a CEILING difference
    description: >-
      In comparative / differential attribution (nudge.inference.differential,
      NUDGE-METHOD-010), NUDGE fits the SAME perturbation in two contexts (a drug-resistant
      vs sensitive line, donor A vs B, disease vs healthy) jointly and BIC-selects which
      single knob — threshold (K), gain (n), or ceiling (v_max) — differs between them. The
      load-bearing confound is a SEQUENCING-DEPTH / BATCH difference ALIGNED WITH THE
      CONTEXT AXIS: because a global depth/library-size scale and the ceiling v_max both
      MULTIPLY the mode means, they are degenerate (the scale⇄vmax degeneracy documented in
      nudge.inference.lyapunov.calibrate_from_wt), so a per-context depth or batch effect
      that happens to line up with the context (resistant cells sequenced deeper, or a
      perturbation batch that tracks the line) mimics a CEILING difference — the classic
      "batch aligned with perturbation" decoy, now at the CONTEXT level. NUDGE defends on
      two fronts. (1) It pins depth/noise PER CONTEXT from each context's OWN control
      (calibrate_from_wt per context), so a depth difference captured by the controls is
      calibrated out before attribution — the analogue of per-sample library-size
      normalization; this REQUIRES each context's control to come from the SAME library as
      its perturbed cells (the standard experimental design). (2) When the two contexts'
      pinned depths DIFFER BEYOND A RATIO — a depth/batch difference aligned with the
      context axis — NUDGE ABSTAINS (unresolved): it cannot certify that an apparent
      ceiling / no-clear difference is not a masked depth artifact. The one exception is a
      CLEANLY-RESOLVED threshold or gain difference, which RESHAPES the distribution
      (orthogonal to a global scale) and so survives a depth difference and stays callable;
      only the ceiling channel is confounded with depth. A SECOND confound channel (P1,
      hardening loop): because the depth guard keys on the CONTROLS, it is structurally
      blind to a constant ADDITIVE / ambient offset applied to ONE context's PERTURBED cells
      only (its control left clean) — the per-context depth ratio stays about 1 and the depth
      gate never engages, yet the offset shifts that context's perturbed modes and compresses
      their separation, which the joint BIC misreads as reduced cooperativity and emits a
      confident spurious gain-diff (verified,
      scripts/redteam/differential_additive_confound.py, 3 confident-wrong across 2 seeds,
      truth = no-difference). NUDGE now guards this with a MEASURED, ONE-SIDED OFF-baseline
      diagnostic (the differential shift of the low-activity quantile of each context's
      PERTURBED cells vs its OWN control): an additive offset TRANSLATES that context's OFF
      baseline UP (off_shift much greater than 1) while a genuine K/n/v_max difference leaves
      the OFF mode anchored near basal (off_shift about 1). Measured separation (FINDINGS P1,
      default regime): every confident-wrong offset had off_shift at least 2.99, the strongest
      genuine gain/ceiling/threshold difference (up to times 3-4) only up to 1.96, so
      classify_differential gate 4b ABSTAINS (unresolved) before any positive call when either
      context's perturbed OFF baseline is inflated above its own control beyond
      off_shift_max = 2.5 (the measured midpoint of that gap, NOT an arbitrary cut). RESIDUAL
      BOUND (honest — CLOSED for the demonstrated inflating offset, BOUNDED in general): the
      guard is deliberately ONE-SIDED (inflation only) because a genuine knob REDUCTION
      deflates the OFF baseline below 1 and a symmetric guard would over-abstain on it; so a
      DEFLATING perturbed-only offset (dropout-like, off_shift below 1) aliases with a genuine
      reduction, is NOT separable by this diagnostic, and remains UNGUARDED and documented.
      The OFF-baseline diagnostic, previously reported for transparency only, is therefore
      load-bearing on its inflation side alone; the guard still requires each context's
      control to come from the SAME library as its perturbed cells. A THIRD confound channel
      (P4, hardening loop re-scan) is the sharpest: a constant MULTIPLICATIVE factor c on ONE
      context's PERTURBED cells only (its control clean) aliases a genuine ceiling (v_max)
      difference 1:1 (both multiply the ON mode) and slips past BOTH earlier guards — the
      control-keyed depth ratio stays about 1 (gate 2 blind) AND a factor scales the near-zero
      OFF BASELINE to near-zero so off_shift stays about 1 (gate 4b blind, since it keys on
      additive TRANSLATION not scale). Verified confident-wrong (spurious ceiling-diff) both
      INFLATING and DEFLATING (scripts/redteam/differential_multiplicative_confound.py, 9
      confident-wrong across 2 seeds, truth = no-difference). NUDGE now guards this with a
      MEASURED OFF-cluster SCALE diagnostic (gate 4c, off_scale = the median-absolute-deviation
      of the below-median-activity OFF cluster in the perturbed cells vs its OWN control): a
      multiplicative factor dilates that OFF-cluster spread by c (off_scale about c) while a
      genuine v_max difference leaves it anchored at basal (off_scale about 1). The guard is
      CEILING-SCOPED (only a v_max winner — a global scale is degenerate with v_max
      specifically, so a genuine gain/threshold difference reshapes the distribution and is
      untouched, no over-abstention there) and abstains when off_scale leaves the measured band
      [0.80, 1.30]. GATE 4C SCOPE (corrected by P5, below — do NOT read as "all inflation
      closed"): gate 4c catches only the LARGE-factor inflation it was calibrated on — measured
      separation (FINDINGS P4, both the red-team basal=0.05 and test basal=0.2 regimes, 3 seeds)
      puts every inflating confound at c at least 1.5 at off_scale at least 1.43 and the strongest
      genuine ceiling (up to times 4) at most 1.18, a clean gap whose midpoint 1.30 is the upper
      guard. It is a per-magnitude BAND with a measured blind gap on the small-factor interior
      (P5): being ceiling-scoped it is silent on a gain winner, and its upper cut 1.30 sits ABOVE
      the genuine-ceiling maximum 1.18, so a small c in (1.18, 1.30] slips it. On the DEFLATION
      side a genuine ceiling REDUCTION collapses the switch toward monostable and shrinks the OFF
      cluster (off_scale 0.61-0.69) into the SAME band as a deflating scale (c 0.5-0.7 gives
      0.48-0.75) — they are FUNDAMENTALLY DEGENERATE without an independent depth anchor, so the
      lower guard (0.80) abstains on BOTH, correctly killing the deflating confound at the honest
      cost of no longer resolving a strong genuine ceiling reduction. A FOURTH confound channel
      (P5, hardening loop final sweep) exposed gate 4c's blind gap and drove the systemic fix. A
      SMALL uniform multiplicative factor c approximately 1.15-1.25 on ONE context's PERTURBED
      cells (control clean) slips gate 4c two ways: at small c the joint LNA-BIC assigns the scale
      to the GAIN (n) channel (it compresses the modes' relative separation), which the
      ceiling-scoped gate 4c never checks, so a confident spurious gain-diff is emitted with
      off_shift approximately 1 (gate 4b blind) and off_scale approximately 1.14-1.29 never
      consulted; and when the scale does win the ceiling channel its off_scale lands in the
      (1.18, 1.30] blind gap between the genuine-ceiling maximum and gate 4c's upper cut
      (verified 8 confident-wrong across 4 seeds, 3 confident-wrong reproduced through the shipped
      path at 2 seeds, scripts/redteam/differential_small_mult_gain_hole.py +
      scripts/vv/p5_measure.py, truth = no-difference). P1 (additive), P4 (large multiplicative)
      and P5 (small multiplicative) are ONE class: a per-condition AFFINE nuisance y = s*x + o on
      one context's perturbed cells. Rather than add a fourth per-magnitude band (which would
      leave the next magnitude a blind gap — whack-a-mole), NUDGE adds the measured, threshold-free
      guard the STATE.md principle mandates ("guard the identifiability, not the confound — never a
      calibrated band"): gate 4d adds the affine (s, o) as a FREE nuisance on the perturbed context
      and, before ANY positive *-diff, abstains unless the BIC-winning knob still EARNS its
      parameter over a pure-affine null (the profiled ΔBIC earn, min over both directions). The
      confound family is BY CONSTRUCTION inside the free-affine null's span, so no (s, o) lets the
      bio knob earn: measured earn is at most -2.1 across the uniform-affine sweep (incl. P5's
      interior AND the (1.18,1.30] gap) while a genuine gain/threshold/ceiling reshapes the
      distribution the affine cannot match and earns +59 to +616 (FINDINGS §P5); the margin 6.0 (a
      BIC strong threshold) sits in the plateau. The refit runs only for a candidate-positive
      winner (abstentions stay cheap). This CLOSES the whole UNIFORM per-condition affine class
      (P1/P4/P5): 0 confident-wrong across the sweep, every positive control preserved, no blind
      gap. RESIDUAL BOUNDs (honest, documented — not "solved"): (1) a NON-uniform perturbed-side
      scale (confined strictly to above-median / ON cells) is observationally IDENTICAL to a
      genuine ceiling and cannot be separated by any readout-only method — it needs an independent
      INERT-FEATURE anchor (housekeeping / spike-in) that estimates (s, o) directly
      (design/PERTURBED_CONFOUND_STRATEGY.md); without one NUDGE abstains on both a genuine ceiling
      and such a scale (the conservative outcome). (2) The gate-4c DEFLATION ceiling-reduction
      sacrifice is unchanged. In short: a per-context multiplicative perturbed-only scale (either
      direction) can never be certified as mechanistic against a ceiling change from a single
      steady-state snapshot; NUDGE abstains rather than emit a confident ceiling-diff, and the
      free-affine earn guard extends that abstention across the whole uniform affine class and
      every winner. NUDGE also abstains when
      either context is underpowered (too few cells)
      or its linear-noise Gaussian is untrustworthy (lna_reliable — low depth / near a
      bifurcation / monostable). VERIFIED on
      synthetic ground truth: a ΔK / Δn / Δv_max pair recovers WHICH knob differs (or
      abstains — threshold is the hardest to resolve from a bistable snapshot, consistent
      with the measured identifiability hierarchy gain > ceiling > threshold, FINDINGS §2),
      a no-difference pair reads no-difference, and a CONFOUNDED pair (a depth/batch shift
      aligned with the context axis but NO real mechanism difference) ABSTAINS unresolved —
      never a spurious mechanism-difference call, 0 confident-wrong across seeds. Reported
      Δ estimates are APPARENT population parameters (with bootstrap CIs), not molecular
      constants, and inherit the readout-nonlinearity bound (NUDGE-LIM-006). Guarded by the
      confound + fail-safe tests, the per-channel decoys (P1 additive
      test_decoy_additive_perturbed_offset_abstains, P4 large-multiplicative
      test_decoy_multiplicative_perturbed_scale_abstains, P5 small-multiplicative
      test_decoy_small_multiplicative_perturbed_scale_abstains), the gate-4d earn contract tests
      (test_classify_gain_winner_absorbed_by_affine_abstains and siblings, which replaced the
      now-falsified ceiling-scoping lock), and the no-over-abstention locks
      (test_genuine_ceiling_earns_over_the_affine_nuisance /
      test_genuine_gain_earns_over_the_affine_nuisance) (tests/inference/test_differential.py).
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is the honesty crux of comparative attribution: a depth/batch difference aligned
      with the context axis is the single most likely way to manufacture a CONFIDENT WRONG
      "ceiling difference" — and it is precisely the artifact a real study is most exposed
      to (the two lines / donors / conditions are often sequenced or prepped in ways that
      track the biology). Calling ceiling-diff off such a shift would send a follow-up
      chasing "more of the same drug" when the true difference is a sequencing artifact —
      the confident-wrong failure the project exists to avoid — and it LOOKS authoritative
      because a joint BIC fit is more convincing than a t-test. The guarantee rests on
      pinning depth PER CONTEXT from each control and ABSTAINING whenever the per-context
      depths differ beyond a ratio (a depth/batch difference aligned with the context axis),
      unless the winner is a cleanly-resolved threshold/gain difference, which — being
      orthogonal to a global scale — remains trustworthy. Removing the per-context
      calibration or the depth-ratio abstention, or loosening it, would resurrect the false
      positive. The P1 additive-perturbed-offset channel is the same class one step sharper:
      a batch/ambient artifact that lands on the PERTURBED cells of one context only (not its
      control) is invisible to the control-keyed depth ratio and manufactures a confident
      gain-diff — so the one-sided OFF-baseline-inflation abstention (gate 4b,
      off_shift_max = 2.5, a measured separator) is now part of the same guarantee; removing
      or raising it above the measured genuine ceiling (about 1.96) resurrects that false
      positive. The P4/P5 multiplicative channels are the same class again, and their
      per-magnitude OFF-cluster bands (gates 4b/4c) each left a blind gap the next magnitude slips
      (P5 verified this — a confident gain-diff/ceiling-diff in the small-factor interior gate 4c
      never sampled). The load-bearing systemic guard is therefore gate 4d: a FREE per-condition
      affine null against which the winning knob must EARN its BIC parameter, which covers the
      whole uniform-affine confound class continuously (no band, no blind gap) and every winner.
      Removing gate 4d, or reverting to per-magnitude bands as the sole defense, resurrects the
      P5 (and the next magnitude's) false positive; the residual is a NON-uniform perturbed-side
      scale that only an independent inert-feature anchor can separate from a genuine ceiling.

  - anomaly_id: NUDGE-LIM-017
    title: A near-fold operating point corrupts the multi-point joint fit — lna_reliable
      is necessary but NOT sufficient
    description: >-
      In multi-operating-point covariance attribution (nudge.inference.lyapunov.
      attribute_lyapunov_multi, the M3 breaker), NUDGE fits ONE shared kinetic value
      jointly across several operating points of the same perturbed condition — the second
      point is what separates gain from threshold (the confound one snapshot cannot break).
      The load-bearing assumption is that each operating point contributes TRUSTWORTHY
      linear-noise moments to the shared-parameter joint fit. The only per-point trust gate
      was lna_reliable, which trips solely on lobe OVERLAP (a mode's √λmax(Σ) exceeding the
      inter-mode separation — the variance-collapse ENDGAME) or on insufficient depth. A
      point that is merely APPROACHING the saddle-node fold — its Lyapunov covariance
      already swelling and its moments already biased, but its lobes NOT yet merged — passes
      lna_reliable rated "ok", and because the fit shares one kinetic across all points, that
      single corrupted point POISONS the joint argmin. Adding operating points is assumed to
      only ever HELP (break the confound); instead a third point that is individually
      "reliable" but near-fold ACTIVELY FLIPS a correct 2-point call to a wrong one. VERIFIED
      (red-team Hole 1): a TRUE ceiling knockdown (vmax×0.6) on a mutual-repression toggle
      seen at basals {0.05, 0.30, 0.60} — the 0.60 point near the fold but passing
      lna_reliable — flips the correct 2-point 'ceiling' to a CONFIDENT WRONG 'threshold'
      (gap ≈0.24–0.30 ≫ resolve_margin 0.03, 2/2 seeds;
      scripts/redteam/nearfold_thirdpoint_hole.py). A FIRST fix gated the joint fit on the
      bifurcation-proximity DIAL with a hard margin (abstain if any point's proximity >
      well_buffered_margin, default 0.15) — but red-team ROUND 2 proved that margin a
      KNIFE-EDGE (scripts/redteam/nearfold_knifeedge_regression.py): a 3rd point at proximity
      0.146 (just under 0.15) still flipped the true ceiling to a confident threshold (gap
      0.53, 2/2 seeds). Measuring the corruption ONSET revealed WHY a hard margin cannot work:
      the validated useful 2nd point sits at proximity 0.112 and the corruption begins at
      0.119 — a 0.007 window — and, decisively, the onset is NON-MONOTONIC in proximity (a
      3rd point at 0.125 is clean while 0.119 and 0.132 both corrupt), so proximity simply
      does not separate a useful operating point from a corrupting one near the fold. Any hard
      proximity threshold there is scientifically invalid. MITIGATION (SHIPPED, red-team round
      2): the hard gate is replaced by two threshold-free mechanisms. (1) GRADED DOWN-WEIGHTING
      — each operating point's contribution to the joint loss decays smoothly (Gaussian in its
      excess bifurcation proximity past well_buffered_margin), so a FAR near-fold point (the
      round-1 witness at proximity 0.231) is weighted ~0 and cannot corrupt the fit (fit_
      lyapunov_multi gains a per-point weights argument). (2) BEST-BUFFERED-PAIR CORROBORATION
      — with >2 points, a resolved bare mechanism is accepted ONLY if it AGREES with the call
      from the two MOST-BUFFERED points; if a marginal point changed the answer, NUDGE
      ABSTAINS. Threshold-free, this closes the 0.007 knife-edge that no margin or weighting
      can, while keeping a genuinely well-buffered multi-point set resolvable and letting a far
      near-fold point be harmlessly down-weighted rather than corrupt the fit (the round-1
      {0.05,0.30,0.60} witness now honestly ABSTAINS via corroboration — measured — instead of
      emitting the confident-wrong 'threshold'; never a wrong bare mechanism, 0 across seeds).
      Guarded by the near-fold decoy (now a fail-safe assertion: never the wrong 'threshold')
      + the knife-edge regression + the multi-point recover-or-abstain tests
      (tests/inference/test_lyapunov_toggle_ssa.py). Related: NUDGE-LIM-012 (the LNA breaks
      down AT the fold — this is the same physics one step earlier, on the APPROACH).
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is a genuine confident-wrong hole (not merely an abstention gap): before the fix,
      the multi-point breaker — the very machinery that is supposed to be MORE trustworthy
      than a single snapshot because it fuses evidence — could be driven to a confident,
      specific, WRONG mechanism by an operating point that every existing gate rated
      reliable. That is exactly the failure the project exists to avoid, and it is
      especially dangerous because a joint multi-point fit LOOKS more authoritative than one
      snapshot, and because the tempting experimental instinct ("add another operating point
      to be sure") is what triggers it. The load-bearing lesson (red-team round 2): a HARD
      proximity margin is scientifically invalid here because the corruption onset is
      non-monotonic in proximity and only ~0.007 above the useful operating point, so it
      cannot be separated by a threshold. The guarantee now rests on the best-buffered-pair
      CORROBORATION (threshold-free): a bare mechanism is trusted only when the most-buffered
      pair confirms it, so a marginal point can never override the well-buffered evidence.
      Removing the corroboration check, or reintroducing a hard proximity gate as the sole
      defense, would resurrect the false positive.

  - anomaly_id: NUDGE-LIM-018
    title: The constitutive control rejects "no switch" but does NOT point-identify the knob
    description: >-
      In the constitutive-reporter calibration control (nudge.inference.constitutive,
      NUDGE-METHOD-011 — the VALIDATED mitigation for NUDGE-LIM-006), a calibration
      population drives the reporter at KNOWN activity doses (bypassing the circuit) and
      anchors the readout using READOUT parameters ONLY (the no-circuit-leak property:
      ∂(control loss)/∂(circuit params) is identically zero, checked by
      control_loss_circuit_gradient). A profile likelihood over the circuit Hill n then
      breaks the readout/circuit degeneracy that makes NUDGE-LIM-006 a confident false
      positive: WITHOUT the control the n-profile is FLAT (a graded n=1 fits as well as a
      real switch — you cannot even tell a switch exists); WITH the control, "no switch"
      (n=1) is REJECTED for a genuine circuit switch (Δloss ≫ the flat no-control span). The
      residual limitation is that this identifies WHETHER a circuit switch EXISTS, not the
      exact knob: the control REJECTS the readout-only explanation but does NOT
      point-identify the circuit n (recovered ≈5 vs true 3 in validation — the profile
      argmin is NOT a reliable point estimate because the circuit's internal K/n/vmax
      trade-off persists). Full point-identification would need a SECOND anchor — an input
      titration / circuit dose-response that pins the circuit's input axis. Consequently the
      method NEVER emits a bare threshold/gain/ceiling call (is_confident_wrong is
      structurally always False); its strongest verdict is 'biological-switch' (a real
      switch exists) and otherwise it ABSTAINS ('unresolved') or reports 'no-confound' when
      the calibrated reporter is ~affine. The calibration is only as good as its
      constitutive dose range/quality (≥4 distinct doses spanning the reporter's dynamic
      range) and the assumed count model / floors / latent-input spread; a narrow, weak, or
      noisy control fails to reject "no switch" and NUDGE abstains rather than guess.
      VERIFIED on synthetic ground truth (tests/inference/test_constitutive.py;
      scripts/vv/constitutive_control.py): a TRUE switch (n=3) through a nonlinear reporter
      (h=6) flips to 'biological-switch' (n=1 rejection ≈0.026 vs a flat no-control span
      ≈0.001), a LINEAR circuit (n=1, the LIM-006 hazard) ABSTAINS 'unresolved' (n=1
      rejection ≈0), 0 confident-wrong across seeds. Inherits nothing that re-opens
      NUDGE-LIM-006. Related: NUDGE-METHOD-011, NUDGE-LIM-006.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This is a fail-safe RESIDUAL of a mitigation, not a confident-wrong hole: the
      capability's whole purpose is to REMOVE a confident false positive (NUDGE-LIM-006), and
      it does so by turning it into either a correct 'biological-switch' call or an honest
      'unresolved' abstention — never a bare mechanism. The safety-relevant risk is a HUMAN
      over-reading the result as more than it is: reading 'biological-switch' as if it
      point-identified the knob, or reading the profile argmin n as a trustworthy gain
      estimate. Both are guarded — the verdict is never a threshold/gain/ceiling and the
      'biological-switch' reason states explicitly that it does NOT point-identify n and
      needs a second anchor — but the guarantee rests on that honest framing being preserved.
      Loosening the rejection gate (the absolute margin, the structure-ratio vs the flat
      no-control span, or the argmin-off-n=1 requirement) toward a claim of the exact knob
      would resurrect over-interpretation; the conjunction is deliberately conservative.
      See also NUDGE-LIM-019: the biological-switch verdict is additionally bounded by a
      shared-capture precondition between the control and the circuit population.

  - anomaly_id: NUDGE-LIM-019
    title: The constitutive control and the circuit population must share a capture/depth
      scale — an unmodeled mismatch re-opens NUDGE-LIM-006
    description: >-
      In the constitutive-reporter calibration control (nudge.inference.constitutive,
      NUDGE-METHOD-011), the control is a SEPARATE population — constitutively-driven reporter
      cells read at KNOWN activity doses — used to anchor the reporter transfer function
      (Km, h, Vmax) so the circuit-n profile can reject "no switch". The load-bearing,
      previously-unstated PRECONDITION: the control and the circuit population must be measured
      on the SAME capture / sequencing-depth scale (co-sequenced, or normalized to a shared
      spike-in / reference). The module compares the control's reporter counts to the
      population's directly (log1p counts + energy distance) with NO relative-depth
      normalization between the two populations, and single-cell samples ROUTINELY differ in
      capture efficiency. VERIFIED (red-team round 2): reading the control at ~0.5x the
      population's capture efficiency mis-anchors the reporter Vmax LOW; the with-control
      circuit-n profile then develops a spurious well away from n=1 and REJECTS "no switch" —
      a confident 'biological-switch' verdict on a TRULY LINEAR (n=1) circuit, i.e. exactly
      the NUDGE-LIM-006 readout-only artifact the capability exists to reject, resurrected
      through a batch/capture confound (scripts/redteam/constitutive_control_batch_confound.py,
      3/3 seeds; a CLEAN control at matched efficiency correctly abstains 'unresolved').
      Critically, this DEFEATS the module's own honesty predicate as originally written:
      ConstitutiveResult.is_confident_wrong counted only bare threshold/gain/ceiling calls, so
      it structurally EXCLUDED 'biological-switch' — treating a falsifiable positive as
      unconditionally safe. RESPONSES (SHIPPED): (1) the honesty contract is broadened — a new
      ConstitutiveResult.asserts_biological_switch surfaces the falsifiable positive, and
      is_confident_wrong's docstring + every doc now state the biological-switch verdict is
      valid ONLY under the shared-capture precondition (the framing is 'adversarially bounded',
      NOT 'structurally fail-safe / 0 confident-wrong'); (2) the confound is LOCKED as a
      strict-xfail decoy (tests/inference/test_constitutive.py) so it cannot silently change;
      (3) the experimental-design precondition (co-measure the control with the population) is
      documented as a requirement, alongside the constitutive control itself. NO runtime gate
      is added here: a capture-efficiency difference between the two populations is, without a
      switch-independent shared reference (the reporter FLOOR / a spike-in), indistinguishable
      from a real switch at the count-magnitude level (a real switch ALSO raises the
      population's counts), so a naive magnitude gate would false-abstain on genuine switches.
      A principled robustness fix (anchor both populations to the switch-independent reporter
      floor / a shared spike-in) is DESIGNED and DOCUMENTED as future work in
      design/CONSTITUTIVE_CONTROL.md (Option B) but deliberately deferred — matched capture is
      a biologically reasonable requirement to state rather than to solve under time pressure.
      Inherits / re-opens NUDGE-LIM-006 when the precondition is violated.
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is a genuine confident-wrong hole (not merely an abstention gap) in the very
      capability built to REMOVE a confident-wrong (NUDGE-LIM-006): a routine batch artifact —
      a capture-efficiency difference between the constitutive control and the circuit
      population — makes NUDGE assert a real biological switch on a linear circuit. It is
      especially dangerous because it slips past the module's own is_confident_wrong guard
      (which was scoped too narrowly to bare-knob calls) and because a 'biological-switch'
      verdict reads as authoritative. The guarantee now rests on the shared-capture
      precondition being STATED (co-measure the control with the population), the honest
      'adversarially bounded' framing (never 'structurally fail-safe'), the asserts_biological_
      switch surface, and the strict-xfail decoy that locks the confound. Reading a
      biological-switch verdict without confirming matched capture, or restoring the
      'structurally fail-safe / 0 confident-wrong' language, would resurrect the false positive.

  - anomaly_id: NUDGE-LIM-020
    title: gLV growth ⇄ self-limitation (α⇄βᵢᵢ) is degenerate near equilibrium
    description: >-
      The temporal / Lotka–Volterra attribution capability (NUDGE-METHOD-012) attributes a
      microbial-community perturbation to a change in growth (α), interaction (β), or
      antibiotic-susceptibility (ε). Two of these axes are fundamentally confounded: a
      taxon's growth rate αᵢ and its self-limitation βᵢᵢ set the carrying capacity together
      as Kᵢ = −αᵢ/βᵢᵢ, so at steady state a growth change and a carrying-capacity change
      produce the SAME equilibrium — they are separable ONLY by the transient (the approach
      to equilibrium). When the sampling does not resolve that transient (near-equilibrium
      or short series), the free-α and free-βᵢᵢ restricted fits tie and the perturbation is
      unidentifiable. NUDGE must NOT confidently name growth-vs-interaction there; it
      ABSTAINS (unresolved). Crucially the abstention is EARNED BY A MEASUREMENT, not
      asserted: the Laplace/Fisher curvature on the pair (αₜ, βₜₜ) is computed
      (alpha_beta_identifiability, reusing inference/uncertainty.laplace_posterior) and is
      near-singular in the degenerate regime — a high condition number (≫ the cond_max=100
      abstain threshold, often numerically infinite) and a strong off-diagonal correlation
      (|corr| → 1) — exactly reproducing how NUDGE measures the gain⇄threshold degeneracy on
      the single-cell path. The identifiable axis is ε (antibiotic susceptibility): the drug
      pulse is a time-localized on/off contrast, so a direct-kill signature is distinct from
      a constant growth/interaction shift, and ε recovers as a positive. A growth change is
      recovered ONLY when the transient is densely sampled (the Laplace curvature is then
      better-conditioned); otherwise it abstains. The classifier is fail-safe: no-change when
      nothing beats the null; unresolved on the measured α⇄βᵢᵢ degeneracy OR when the two
      best knobs tie; a positive only when the winner earns its parameter over the null,
      beats the runner-up, and (in the confounded pair) is identifiable. VERIFIED on
      synthetic ground truth (tests/inference/test_lotka_volterra.py): ε recovers, a
      dense-transient growth change recovers, a self-interaction change and a
      near-equilibrium growth change ABSTAIN with a measured near-singular Hessian, a
      no-perturbation null makes no positive call — 0 confident-wrong across the battery.
      Exercised by generate_alpha_beta_confound_decoy (a growth change sampled near
      equilibrium that LOOKS like an interaction change → must abstain) and
      generate_no_perturbation_null. Related: NUDGE-METHOD-012.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      Handled correctly today (NUDGE abstains, 0 confident-wrong), but the guarantee rests on
      the Laplace degeneracy gate's calibration (cond_max) and the BIC resolve margin. gLV
      inference is famously ill-posed, so the honest default is to abstain OFTEN — a
      mis-tuned gate that loosened toward a confident growth-vs-interaction call near
      equilibrium would resurrect a confident-wrong hole. The ε axis is the only reliably
      identifiable one at low species count; separating α from β for a diet-like shift, or
      reconstructing a full β matrix from short/noisy series, is beyond what the data
      supports and NUDGE must not pretend otherwise. The decoy + the measured-curvature
      requirement are the regression tests that keep the abstention earned rather than
      asserted.

  - anomaly_id: NUDGE-LIM-021
    title: A single aggregation curve identifies only the composites κ, λ — the three microscopic rate constants are gauge-degenerate
    description: >-
      The protein-aggregation / fibrillization mechanism (NUDGE-METHOD-013) fits an amyloid
      aggregation curve to the filament master equation's principal moments (dP/dt =
      k_n·m^{n_c} + k_2·m^{n_2}·M; dM/dt = 2·k_+·m·P; Knowles/Cohen/Meisl 2016, Michaels
      2020) and attributes an inhibitor to the microscopic rate constant it lowers (primary
      nucleation k_n / elongation k_+ / secondary nucleation k_2). From a SINGLE curve at a
      SINGLE monomer concentration only the two composite parameters λ = √(2·k_+·k_n·
      m_tot^{n_c}) and κ = √(2·k_+·k_2·m_tot^{n_2+1}) are identifiable; the three individual
      constants are NOT, because the moment model has an EXACT continuous gauge symmetry —
      (k_n, k_+, k_2) → (k_n/α, α·k_+, k_2/α) leaves the mass-fraction curve M(t)/m_tot
      identical for any α > 0 (verified numerically here: a 100× k_+ rescale changes the
      curve by ~1e-16, machine precision). NUDGE must NOT report false-precise individual
      rate constants from one curve; it returns the composites (with CIs) + the null
      direction and prescribes more experiments. Crucially the abstention is EARNED BY A
      MEASUREMENT, not asserted: the Fisher/Laplace curvature on (log k_n, log k_+, log k_2)
      is computed (individual_k_identifiability, reusing inference/uncertainty.
      laplace_posterior) and has a genuine zero eigenvalue along the null direction ≈
      (+log k_n, −log k_+, +log k_2) — condition number → ∞ — so all three constants are
      flagged unidentifiable, exactly reproducing how NUDGE measures the gain⇄threshold and
      α⇄βᵢᵢ degeneracies elsewhere. What DOES resolve the individuals: the mass-fraction
      gauge is CONCENTRATION-INDEPENDENT, so a concentration series ALONE still cannot
      separate them (measured: series_identifiability stays degenerate, cond → ∞); the gauge
      is broken only by a SEEDED / elongation reference (a heavily-seeded early-window curve
      where dM/dt ≈ 2·k_+·m·P_0 constrains k_+ directly) — the Meisl discipline — after
      which the global fit resolves all three (verified: k_n, k_+, k_2 recovered within 25%,
      0 confident-wrong, in a balanced regime where both nucleation pathways contribute). In
      a strongly secondary-dominated regime (κ ≫ λ) the primary rate k_n stays weakly
      determined even with an anchor (the primary pathway is negligible) — a sloppy-but-
      identifiable direction NUDGE reports with a wide CI rather than a false-precise value.
      A further documented ambiguity: a global monomer-sequestering inhibitor scales λ and κ
      together, the same composite signature as a fibril-END (k_+) binder, so the inhibitor
      attribution reports "elongation OR monomer-sequestration" for the equal-drop case
      rather than over-claiming. VERIFIED on synthetic ground truth
      (tests/mechanisms/test_fibrillization.py): a single curve recovers κ ≈ 1, λ ≈ 0.01 and
      ABSTAINS on the three individual constants with a measured gauge null; a concentration
      series WITHOUT an anchor stays degenerate; a series WITH a seeded anchor resolves all
      three; the inhibitor battery is 0 confident-wrong (recover the true microscopic target
      — secondary / elongation / primary — or abstain, never a wrong step). Related:
      NUDGE-METHOD-013.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      Handled correctly today (NUDGE abstains on the individual constants and reports only
      the identifiable composites, 0 confident-wrong), but the guarantee rests on the
      Fisher/Laplace gauge-degeneracy measurement and the discipline of NEVER reporting a
      false-precise k from insufficient data. Aggregation-kinetic inference is a classic
      overfitting trap: a naive least-squares fit of the three log-k's returns confident
      point estimates that are meaningless (any point on the gauge orbit fits equally well).
      The condition number ALONE is an unreliable identifiability test (the sloppiness
      caveat: a sloppy-but-identifiable spectrum has a large finite cond, distinct from the
      genuine zero eigenvalue of the gauge) — so the verdict keys on a flat (zero-curvature)
      direction, not a cond threshold, and reports the cond as a sloppiness caveat. The
      seeded-anchor requirement, the balanced-regime caveat for k_n, and the elongation ⇄
      monomer-sequestration ambiguity are the honest bounds; the tests are the regression
      that keeps the abstention earned rather than asserted.

  - anomaly_id: NUDGE-LIM-022
    title: The adjoint gradient is O(1) in the parameter count but its memory grows with the trajectory length (no gradient checkpointing)
    description: >-
      The adjoint-sensitivity path (nudge.inference.adjoint: adjoint_gradient / fit_ode_adjoint /
      ode_identifiability) computes the gradient of a trajectory-fit loss L(θ) w.r.t. every kinetic
      parameter θ at a cost effectively INDEPENDENT of the parameter count n_θ — it is the discrete
      adjoint, i.e. reverse-mode AD through the lax.scan RK4 integrator, so one forward solve + one
      reverse solve yields the full gradient regardless of n_θ, and it is bit-for-bit equal to the
      explicit forward-sensitivity gradient (VERIFIED, tests/inference/test_adjoint.py: the two agree
      to machine tolerance; rel-err ≈ 0). This is the capability the ad-hoc forward-sensitivity
      baseline lacks: that augmented system has size n_x·(1+n_θ) and blows up in BOTH time and memory
      as n_θ grows (MEASURED, scripts/vv/adjoint_scaling.py). The LIMITATION / honest bound: the
      adjoint's O(1)-in-n_θ claim is about the PARAMETER count, NOT free — reverse-mode AD stores the
      forward tape (every RK4 stage state along the trajectory), so its PEAK MEMORY grows LINEARLY
      with the TRAJECTORY LENGTH (n_steps · n_x). This module does NOT implement gradient
      checkpointing (the standard √n_steps memory↔recompute trade, Griewank–Walther / Chen et al.
      2018 neural-ODE checkpointing), so on a trajectory with very many time steps the reverse pass
      can still exhaust memory even though it is flat in n_θ. The fallback is therefore explicit and
      bounded: (1) the adjoint is the right tool for MANY-PARAMETER, moderate-length trajectories
      (the target regime — 15+ states, hundreds of parameters, where forward sensitivity OOMs first);
      (2) for pathological trajectory LENGTHS the user must sub-sample the observation grid or supply
      checkpointing, which is out of scope here; (3) NUDGE never silently mislabels — the identifiability
      diagnostic built on the adjoint (ode_identifiability) inherits the matrix-free fail-safe
      (NUDGE-LIM-023) and abstains rather than assert a verdict it cannot verify. So the adjoint is a
      strict Pareto improvement over the forward-sensitivity baseline on the parameter axis, with a
      clearly-stated residual cost on the trajectory-length axis rather than an unqualified "O(1)"
      overclaim. Related: NUDGE-METHOD (adjoint sensitivity), NUDGE-LIM-023.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This is a gradient-computation capability, not an attribution verdict, so it cannot itself emit
      a confident-wrong mechanism call — the risk is purely operational (an out-of-memory reverse pass
      on an over-long trajectory), which fails loudly (an allocation error), never silently returning a
      wrong gradient. The gradient it does return is exact (bit-for-bit equal to forward sensitivity,
      regression-locked), and the identifiability diagnostic layered on top inherits the matrix-free
      abstention (NUDGE-LIM-023). The honest framing — "O(1) in the parameter count, but memory grows
      with trajectory length; no checkpointing" — is what keeps the efficiency claim measured rather
      than oversold.

  - anomaly_id: NUDGE-LIM-023
    title: Matrix-free identifiability cannot certify the smallest FIM eigenvalue by iteration
    description: >-
      The matrix-free sloppiness/identifiability path (sloppiness_diagnostic_matrixfree /
      analyze_model_matrixfree / adjoint.ode_identifiability) computes the Fisher-information
      (FIM = JᵀJ/σ²) eigenspectrum using ONLY matrix-vector products JᵀJ·v (one jax.jvp J·v
      composed with one jax.vjp Jᵀ·w), never materializing J, so it does NOT OOM the way the
      dense jacfwd path does on a large ODE network (MEASURED, scripts/vv/sloppiness_scaling.py:
      a 77-state gLV, dense jacfwd OOMs at ~4000–6000 free params under a 2.5 GB cap while the
      matrix-free path stays flat at ~0.42 GB / ~3 s to 6000 params). The CORE LIMITATION: a
      matrix-free Krylov eigensolver cannot certify the SMALLEST FIM eigenvalue — and the
      smallest eigenvalue / its eigenvector is exactly the sloppy/near-null direction the
      diagnostic reports. The P6 red-team (round 6) sharpened this into a concrete confident-wrong
      the module's ORIGINAL fail-safe missed: on an ISOLATED exact structural null embedded in an
      otherwise well-conditioned spectrum (two parameters entering only via their sum; n_params ≤
      n_obs, so the shape-null certificate is inapplicable), eigsh(which='SA') converges to the
      well-conditioned cluster and MISSES the isolated zero — the pairs it returns are GENUINE
      eigenpairs, so they pass the Rayleigh residual (which verifies eigenpair-NESS, not
      smallest-NESS) — so the iterative / auto path (n_params > dense_below) returned
      label='well-constrained' n_null=0 ("every parameter individually identifiable") on a
      provably-unidentifiable model, the single most dangerous mislabel (VERIFIED 6/6 across
      seeds at full float64, NOT the float32 caveat;
      scripts/redteam/sloppiness_matrixfree_iterative_mislabel.py). FIXED (measured, FINDINGS §P6)
      on three lines so the iterative path is never confidently wrong: (1) shape-null — when
      n_params > n_obs the FIM is rank-deficient BY SHAPE ⇒ unidentifiable from shape alone
      (unchanged; the realistic large-network regime). (2) auto now DEFERS to the EXACT
      dense-via-matvec reconstruction up to dense_below=2048 (raised from 256): it rebuilds the
      n_params×n_params FIM from n_params matvecs and eigh's it (still never forming J or the
      jacfwd tangent), recovering the exact smallest eigenvalue / null — MEASURED affordable on a
      ~15 GB box (~18 s / 0.7 GB peak at n=2048, ~42 s / 2.0 GB at 4096, recovering the exact
      null n_null=1 at every size 256–4096), routing the entire realistic/default regime through
      the exact path. (3) above dense_below (or explicit method='iterative') the smallest end is
      probed by INVERSE ITERATION (shift-invert via CG, _smallest_eig_null_probe): it AMPLIFIES
      the FIM's smallest eigenvalue (a null is the strictly dominant eigenpair of (FIM+εI)⁻¹) and
      reliably CATCHES the isolated null eigsh('SA') misses (MEASURED: Rayleigh quotient ~1e-12–1e-10,
      orders of magnitude below the rank floor rank_rtol^2*lam_max (~3e-10), on the P6 models
      where eigsh returned ~1661; 0 false nulls on well-conditioned
      + sloppy controls; ~150–800 matvecs, <0.3 s). A residual-verified near-null ⇒ unidentifiable
      naming the null direction; if NO null is found the full smallest spectrum is still not
      certifiable matrix-free (the probe is one-sided — a low Rayleigh quotient PROVES a null, but
      a large one does NOT prove identifiability; MEASURED: on a dense sloppy small-end inverse
      iteration overestimates λ_min), so the path ABSTAINS (unidentifiable, "cannot certify the
      smallest eigenvalue"). Trace-completeness (tr FIM = Σλ) was evaluated and REJECTED as a null
      certificate — a missed ZERO changes the trace by 0, so it cannot see the P6 case (MEASURED).
      CLOSED vs BOUNDED. CLOSED: the isolated-structural-null mislabel — 0/6 confident-wrong
      across the reported seeds/sizes via the DEFAULT method='auto' (n=300) and explicit
      method='iterative' (n=40, n=3000); genuine well-constrained and sloppy-but-predictive
      positive controls still resolve via the dense/affordable path (NO over-abstention below
      dense_below); dense==auto label agreement preserved. BOUNDED (documented, locked): above
      dense_below with no shape-null and no isolated null found, the iterative path CANNOT return
      a positive well-constrained / sloppy-but-predictive verdict — it OVER-ABSTAINS
      (unidentifiable; over-abstaining is the fail-safe direction, never a confident-wrong); the
      exact positive verdict is recoverable on demand via method='dense' (O(n_params²) memory) or
      by raising dense_below. The inverse-iteration probe reports ONE null direction even when the
      true null space is higher-dimensional (the LABEL is correct but the null COUNT can be
      undercounted in the iterative path; exact counts need method='dense'). Guards:
      tests/inference/test_sloppiness_p6_structural_null.py (regression + positive controls + a
      strict-xfail decoy locking the over-abstention bound),
      tests/inference/test_sloppiness_matrixfree.py (dense==matrix-free agreement + iterative
      fail-safe), scripts/redteam/sloppiness_matrixfree_iterative_mislabel.py (0/6 after fix).
      Related: NUDGE-METHOD (sloppiness diagnostic), the adjoint scaling capability, FINDINGS §P6
      "Matrix-free identifiability — the isolated-null certification gap".
    severity: major
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      The dangerous error is labelling a rank-deficient / structurally-unidentifiable model
      "well-constrained" or "sloppy-but-predictive" — a false green-light for a downstream
      point-estimate / attribution the data cannot support. P6 showed the ORIGINAL fail-safe
      (Rayleigh-residual verification) was INSUFFICIENT for an isolated null (it verifies
      eigenpair-ness, not smallest-ness), so that mislabel was briefly live on the iterative /
      auto path. It is now prevented on three lines: the shape-null certificate, the auto-defer to
      the exact dense reconstruction up to dense_below=2048, and — where neither applies — an
      inverse-iteration null probe that reliably catches an isolated null plus a hard abstention
      when the smallest end cannot be certified. The guarantee is asymmetric and honest: proving a
      SMALL eigenvalue (a null ⇒ unidentifiable) is safe from a low Rayleigh quotient, but proving
      a LARGE smallest eigenvalue (identifiability) needs the exact spectrum, so above dense_below
      the path abstains (over-abstains, never over-claims). Severity major because a regression in
      any of the three guards reintroduces the single most dangerous mislabel (unidentifiable →
      well-constrained); the regression test, the positive controls, and the strict-xfail decoy
      keep the guards — and the earned abstention — in place.

  - anomaly_id: NUDGE-LIM-024
    title: Gradient-based optimal experimental design is LOCAL (valid near the nominal θ₀)
    description: >-
      The optimal-experimental-design capability (NUDGE-METHOD-014, nudge.inference.oed)
      gradient-optimizes an experimental design φ (the measurement times) to maximize a
      Fisher-information criterion — D-optimality (log det FIM), E-optimality (smallest FIM
      eigenvalue), or the targeted reciprocal Cramér–Rao bound of one sloppy parameter — and
      so prescribes the exact experiment that resolves a degenerate parameter (e.g. the gLV
      growth⇄self-limitation α⇄βᵢᵢ pair that NUDGE-METHOD-012 abstains on near equilibrium,
      Kᵢ=−αᵢ/βᵢᵢ). The Fisher Information Matrix FIM(φ) = J(φ)ᵀJ(φ)/σ² is the LOCAL curvature
      of the likelihood at a NOMINAL parameter θ₀, so the design it returns is optimal for
      parameters NEAR θ₀ and the reported identifiability gains (the CRLB / smallest-
      eigenvalue improvement factors) are the ones MEASURED at θ₀ — they are NOT extrapolated
      and are NOT guaranteed if the true parameters are far from θ₀. This is the standard
      local-OED caveat: a fully robust design would marginalize the criterion over a prior on
      θ (Bayesian / pseudo-Bayesian OED) or min-max over a θ box, which this module does NOT
      implement. NUDGE must therefore present an optimal design as "optimal given the current
      best estimate θ₀", never as unconditionally optimal, and must report the gain as a
      measurement at θ₀. Two further honest bounds: (1) the design gradient finds a LOCAL
      optimum of a generally non-convex criterion — it converges deterministically to a good
      design (the whole point vs a black-box grid search) but not provably the global one, so
      the module also ships a grid-search baseline to CHECK the gradient optimum (on a 1-D
      design knob the gradient lands on the fine grid's optimum; a structured grid
      guaranteeing the optimum over m free times costs rᵐ evaluations, infeasible — the moat);
      (2) near-singular FIMs are inverted with a guarded relative ridge (never a plain
      pseudo-inverse, which would zero a flat direction's variance and UNDERSTATE the CRLB —
      the opposite of safe), so a reported CRLB on a still-degenerate design is a large-but-
      finite over-cautious bound, not a false-precise small one. VERIFIED on synthetic ground
      truth (tests/inference/test_oed.py; scripts/vv/FINDINGS.md "Optimal Experimental
      Design"): the naive near-equilibrium design is measurably near-singular; the gradient-
      optimal design resolves the growth parameter (logistic ~31x CRLB / ~18x smallest
      eigenvalue; gLV ~600x CRLB) across all three objectives; the design gradient is finite
      and non-zero; the 1-D gradient optimum coincides with the fine-grid optimum. Related:
      NUDGE-METHOD-014, NUDGE-METHOD-012, NUDGE-LIM-020.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This is a design-recommendation capability, not an attribution verdict, so it cannot
      itself emit a confident-wrong mechanism call — its output is "measure at these times to
      resolve parameter X", and the risk is a design that under-delivers on identifiability if
      the true θ is far from the nominal θ₀ used to build the FIM (the local-OED caveat) or if
      the gradient settled on a local rather than global optimum. Both are bounded by
      construction: the reported gain is a MEASUREMENT at θ₀ (never extrapolated), the
      guarded-ridge inverse makes an unresolved design's CRLB over-cautious rather than
      false-precise, and the grid-search baseline lets a caller CHECK the gradient optimum.
      The honest framing — "optimal given the current best estimate, gain measured at θ₀" —
      and the tests are what keep the prescription from being oversold.

  - anomaly_id: NUDGE-LIM-025
    title: The multi-operating-point breaker resolves only when the operating points
      MEASURABLY break the gain⇄threshold degeneracy — a threshold-dominated large-gain
      perturbation is abstained, not resolved
    description: >-
      The multi-operating-point covariance breaker (nudge.inference.lyapunov.
      attribute_lyapunov_multi, M3) fits ONE shared kinetic value jointly across ≥2 operating
      points of the same perturbed condition and resolves the mechanism whose joint NLL wins
      by resolve_margin (0.03) — the second operating point is what is supposed to separate
      gain (Hill n) from threshold (K), the confound a single snapshot cannot break. It has
      near-fold proximity down-weighting + best-buffered-pair corroboration (NUDGE-LIM-017) —
      but those inspect the WT/CONTROL circuit at each operating point, and the load-bearing
      resolution decision was a PURE NLL-gap test with NO identifiability check. VERIFIED
      confident-wrong (red-team P7; scripts/redteam/lyapunov_multi_gain_threshold_hole.py, LNA
      mixture ground truth on a mutual-repression toggle, SCALE=20, OBS_SD=0.5, two operating
      points bB ∈ {0.05, 0.30}, 3000 cells): a large GAIN knockdown (Hill n 4→1.5) is resolved
      to a CONFIDENT 'threshold' with an NLL gap ≈1.70 ≫ 0.03 (2/2 seeds) even though the true
      knob is gain. Root cause (MEASURED): a large gain drop is threshold-DOMINATED in the LNA
      moments (flattening the Hill curve shifts the effective EC50, so a ΔK explains the
      dominant shift), and the perturbed condition slides THROUGH the saddle-node fold — at
      bB=0.30 it is monostable (bifurcation_proximity None), at bB=0.05 it sits AT the fold
      (proximity ≈0.539). So the second operating point carries no independent gain-vs-
      threshold information — the degeneracy is NOT broken — yet the NLL gap resolves anyway.
      The naive intuition "degenerate joint fit ⇒ abstain" is FALSIFIED here: the joint (Δn,
      ΔK) Laplace condition number is INVERTED — the CORRECT threshold case is degenerate
      (cond ≈1000–1300, gain a free nuisance) while the WRONG large-gain case is well-
      conditioned (cond ≈7, both knobs identifiable). MITIGATION (SHIPPED, additive in
      inference/lyapunov.py; frozen fit.py/core untouched): (1) an IDENTIFIABILITY GATE — after
      the breaker resolves a bare mechanism X, _resolution_contamination fits the joint (X,
      runner-up Y) two-mechanism model (_fixed_root_multi_loss + _fit_fixed_root) and reads the
      Laplace posterior (uncertainty.laplace_posterior, the SAME machinery the single-operating-
      point call abstains with); if any runner-up Y is IDENTIFIABLE and DISPLACED from its no-
      change value beyond a MEASURED cut (_CONTAM_MARGIN=0.5 log-units), the data demonstrably
      needs a SECOND mechanism, so NUDGE ABSTAINS regardless of the NLL gap. The cut is a
      measured separator, not a guessed constant: genuine single-mechanism resolutions leave
      every runner-up unidentifiable or barely displaced (K=2.0 threshold → 0.095; genuine
      ceiling vmax=1.5 → 0.114–0.116) while the n=1.5 confident-wrong forces the runner-up gain
      ≈1.0 log-units off nominal (1.013–1.042), so 0.5 sits centred in the gap with ~0.4-log
      margin each side. (2) GRACEFUL MONOSTABLE DEGRADATION — an operating point whose circuit
      has lost bistability (bifurcation_proximity None / < 2 stable modes) now returns
      ('unresolved', {}) ("bistability lost") instead of raising ValueError deep in the k_modes
      fit; the joint-fit calls are also wrapped so a mid-fit drift to monostability abstains
      rather than crashing. RE-VALIDATED (shipped attribute_lyapunov_multi): n=1.5 → unresolved
      (2/2 seeds, 0 confident-wrong); K=2.0 → threshold (positive control, no over-abstention);
      n=2.4 → unresolved (unchanged); a monostable operating point → ('unresolved', {})
      gracefully. RESIDUAL BOUND (honest): a large-gain perturbation that is genuinely
      threshold-dominated and has slid through the fold is FUNDAMENTALLY non-separable from a
      threshold shift with only these two operating points, so NUDGE ABSTAINS on it (the honest
      outcome) rather than emitting a false-precise 'threshold' — recovering a positive gain
      call there would need a better-buffered operating point (one where the perturbed condition
      stays well inside bistability). This over-abstention on a genuinely-degenerate large-gain
      case is a fail-safe residual (locked as a strict-xfail decoy), never a confident-wrong.
      Guarded by tests/inference/test_lyapunov_multi_uq_gate.py. Related: NUDGE-LIM-017 (near-
      fold WT-side gate — this is the perturbed-side identifiability the NLL gap was blind to),
      NUDGE-LIM-012 (the LNA breaks down AT the fold).
    severity: major
    safety_relevance: safety_relevant
    safety_relevance_rationale: >-
      This is a genuine confident-wrong hole (not merely an abstention gap): the multi-point
      breaker — the very machinery meant to be MORE trustworthy than a single snapshot because
      it fuses evidence across operating points — emitted a confident, specific, WRONG mechanism
      ('threshold' for a true gain knockdown) with a large NLL gap, exactly the failure the
      project exists to avoid, and especially dangerous because a joint multi-point fit LOOKS
      more authoritative than one snapshot. The load-bearing lesson: the NLL gap measures fit
      quality, not identifiability, and the guards that DID exist (NUDGE-LIM-017 near-fold down-
      weighting, best-buffered-pair corroboration, lna_reliable) all key on the WT/CONTROL
      circuit and are blind to a perturbed condition that has itself slid to/through the fold —
      the systemic "guard keyed on the control misses the confound on the perturbed side"
      pattern. The fix does not add another proximity threshold (which NUDGE-LIM-017 already
      proved is a scientifically-invalid knife-edge near a fold); it measures the identifiability
      of the resolution directly (does a runner-up mechanism earn an identifiable, displaced
      parameter in the joint Laplace posterior) and abstains when the resolved single mechanism
      is insufficient. Removing the identifiability gate, or lowering _CONTAM_MARGIN below the
      measured genuine-resolution ceiling (≈0.12), would resurrect the false positive.

  - anomaly_id: NUDGE-LIM-026
    title: The AD amyloid-β QSP demo uses demo-scaled constants + a synthetic cohort (not real patients)
    description: >-
      The flagship Alzheimer's-disease clinical demo (nudge.mechanisms.ad_qsp;
      scripts/demo_matrix_free_scale.py + scripts/demo_gradient_oed.py) points NUDGE's matrix-
      free population identifiability (NUDGE-LIM-023) and gradient OED (NUDGE-METHOD-014) at a
      REAL, published, open amyloid-β quantitative-systems-pharmacology model — Proctor,
      Boche, Gray & Nicoll, PLoS ONE 2013 8(9):e73631 (PMID 24098635), BioModels
      BIOMD0000000488, CC0 public domain. Two honesty bounds are load-bearing and must never
      be elided in any framing of the demo. (1) SYNTHETIC COHORT, NOT REAL PATIENT DATA: the
      calibration target is a synthetic ground-truth cohort generated FROM the model itself
      (nonlinear-mixed-effects subject-specific parameters with inter-subject variability), so
      every headline number is a property of the model + synthetic data, and the demo must
      NEVER be presented as fit to real Alzheimer's patients or as a clinical finding about
      any drug. (2) DEMO-SCALED CONSTANTS, NOT THE PUBLISHED PARAMETERIZATION: the FULL 64-
      state Proctor network (Aβ + tau + p53/Mdm2 + ubiquitin–proteasome + microglia) is
      transcribed faithfully and in full from the CC0 SBML into nudge.mechanisms._proctor2013
      (auto-generated by scripts/vv/gen_proctor2013.py; 64 dynamic states, 73 kinetic
      parameters, 112 reactions; verified to parse and evaluate a finite vector field), and
      that IS the exact published model. But the published parameterization is a stochastic /
      stiff seconds-to-years system (rate constants span kpf=0.2 to kaggAbeta=3e-6, a ~7e4
      stiffness ratio) that the original integrated with Gillespie / LSODA; an EXPLICIT fixed-
      step RK4 (NUDGE's differentiable lax.scan integrator, no diffrax / implicit solver)
      cannot integrate it over disease timescales without diverging (MEASURED: it blows up to
      the abundance clip within days for any physiological monomer pool, at every dt tried down
      to 6 s). So the differentiable demo keeps the published reaction TOPOLOGY and rate-LAW
      FORMS — the autocatalytic Hill plaque-growth switch (Proctor AbetaPlaqueGrowth: gain kpg
      / threshold kpghalf), the monomer→oligomer→plaque aggregation cascade, antibody PK/PD
      (dosing → target binding → clearance), and microglial plaque clearance — but uses NON-
      DIMENSIONALIZED, demo-scaled rate constants chosen so the explicit RK4 cascade is a
      bounded, sensible amyloid→plaque sigmoid (verified: plaque plateaus, an antibody dose
      lowers plaque ~89%). The identifiability STRUCTURE NUDGE reports (which rate constants
      are sloppy — the plaque-growth gain kpg / threshold Kpg and disaggregation k_dis; which
      pairs are confounded — antibody binding k_on ⇄ microglial clearance k_gl) is a property
      of the rate-law forms, which are preserved, but the specific sloppiness magnitudes and
      OED gains (measured: single-subject sloppy-but-predictive at cond ≈7e8 / span ~8.8
      decades; the k_on⇄k_gl pair corr ≈1.000 under a naive baseline+end amyloid-PET schedule,
      resolved by gradient OED to ~220x CRLB / ~205x smallest-eigenvalue improvement, MEASURED
      at θ₀ — inherits NUDGE-LIM-024 local-OED) are for the demo-scaled model, not the
      published constants and not any patient. The population-scale OOM story is genuine and
      sourced correctly: a single-subject fit is only ~12 parameters (no OOM); the
      dimensionality comes from population-scale calibration (N subjects × 12 subject-specific
      parameters → thousands of free parameters at fixed integrated state), where dense jacfwd
      OOMs (MEASURED: OOM-killed at n_free≥1000 under a 2.5 GB systemd MemoryMax cap, state =
      N×6) while the matrix-free FIM matvec stays flat (~0.57 GB) and returns the same verdict.
      A faithful full-model demo would require an implicit / stiff differentiable ODE solver
      (out of scope; diffrax is not a dependency) and, for a genuine clinical claim, real
      longitudinal biomarker data under an appropriate data-use agreement — neither of which
      this demo asserts. Related: NUDGE-LIM-023 (matrix-free smallest-eigenvalue fail-safe —
      the population verdict here is the certified-unidentifiable rank-deficient case),
      NUDGE-LIM-024 (local OED), NUDGE-METHOD-014.
    severity: minor
    safety_relevance: context_dependent
    safety_relevance_rationale: >-
      This is a methods DEMONSTRATION on a synthetic cohort, not an attribution verdict on real
      data, so it cannot emit a confident-wrong mechanism call about a patient or a drug — but
      the credibility risk is real if the demo were oversold: presenting demo-scaled-constant,
      synthetic-cohort results as a real clinical finding, or as fit to the published
      parameterization, would be exactly the kind of overclaim the project exists to avoid. The
      two bounds — SYNTHETIC (never real patients) and DEMO-SCALED (published topology + rate-
      law forms, but non-dimensionalized constants because explicit RK4 cannot integrate the
      stiff published system) — must ride with every headline number. The measured
      identifiability/OED numbers are honest properties of the differentiable demo model at θ₀
      (local OED, NUDGE-LIM-024); they are not extrapolated, not patient findings, and not
      claims about the published constants. The full published network is retained verbatim in
      _proctor2013.py precisely so the faithful ground truth and the demo-scaled tractable
      model are both auditable and never conflated.

  - anomaly_id: NUDGE-LIM-027
    title: The identifiability / OED MCP tools operate over a NAMED model registry, not arbitrary user models
    description: >-
      The general `identifiability` and `oed` MCP tools (nudge.mcp.server; nudge.service
      .identifiability_tool / .oed_tool) drive NUDGE's matrix-free Fisher-information
      diagnostic (NUDGE-LIM-023) and gradient optimal experimental design (NUDGE-METHOD-014,
      NUDGE-LIM-024) over a general MODEL REGISTRY (nudge.inference.model_registry) — a
      name→builder table populated with several genuinely different differentiable models
      across domains (glv — microbiome ecology; linear_pathway — reaction kinetics; ad_qsp —
      clinical pharmacology; logistic — population dynamics; plus the canonical
      sum_of_exponentials / redundant_exponential / well_conditioned toys). Both tools take a
      model BY NAME from that registry and run the REAL analysis (never a hardcoded answer),
      which is what makes the capability demonstrably general rather than demo-specific — it
      works identically on ≥3 different models, and returns whatever it measures, including
      honest abstentions (the well_conditioned decoy must NOT be flagged sloppy; the
      redundant_exponential decoy must abstain `unidentifiable`). The BOUND: the tools reach a
      model only through the registry. An arbitrary user model that is not registered cannot be
      analysed by the `identifiability(model=...)` / `oed(model=...)` string interface. This is
      a convenience-surface scope, not a capability limit: any differentiable
      `predict_fn(theta) -> observations` or `observe(theta, phi)` forward model can be analysed
      directly via the `import nudge` library path
      (nudge.inference.sloppiness.analyze_model_matrixfree /
      nudge.inference.oed.optimize_design), and registering a model to expose it through the
      tools is a few lines (nudge.inference.model_registry.register_model; documented in the
      module docstring + the Mechanism Cards). NUDGE never fabricates a verdict for an unknown
      model name — it returns an explicit error listing the registered models — so the
      registry scope cannot produce a confident-wrong answer. Related: NUDGE-LIM-023
      (matrix-free identifiability fail-safe), NUDGE-LIM-024 (local OED), NUDGE-METHOD-014.
    severity: minor
    safety_relevance: not_safety_relevant
    safety_relevance_rationale: >-
      Purely a scope/ergonomics boundary of the string-keyed tool interface, not a correctness
      hazard: an unregistered model name returns an explicit error (the list of registered
      models), never a fabricated verdict, and the underlying diagnostics carry their own
      fail-safes (NUDGE-LIM-023 abstains rather than assert un-certified identifiability;
      NUDGE-LIM-024 marks OED as a local design recommendation, not an attribution verdict). The
      decoy models in the registry (well_conditioned must not read as sloppy; redundant_exponential
      must abstain) are the standing check that the general tool returns the correct verdict per
      model rather than a demo-tuned constant.
